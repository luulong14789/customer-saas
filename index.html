<!DOCTYPE html>
<html>
<head>

<title>Customer CRM SaaS</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>

body{
background:#f1f5f9;
}

.sidebar{
height:100vh;
background:#0f172a;
color:white;
padding:20px;
}

.sidebar h3{
color:#38bdf8;
margin-bottom:30px;
}

.sidebar a{
display:block;
color:white;
padding:10px;
text-decoration:none;
border-radius:6px;
margin-bottom:8px;
}

.sidebar a:hover{
background:#1e293b;
}

.card-stat{
border:none;
border-radius:10px;
color:white;
}

.bg1{background:#3b82f6;}
.bg2{background:#10b981;}
.bg3{background:#f59e0b;}

.avatar{
width:35px;
height:35px;
border-radius:50%;
background:#3b82f6;
color:white;
display:flex;
align-items:center;
justify-content:center;
}

</style>

</head>

<body>

<div class="container-fluid">

<div class="row">

<!-- SIDEBAR -->

<div class="col-2 sidebar">

<h3>CRM SaaS</h3>

<a href="#"><i class="fa fa-chart-line"></i> Dashboard</a>
<a href="#"><i class="fa fa-users"></i> Customers</a>
<a href="#"><i class="fa fa-envelope"></i> Email</a>
<a href="#"><i class="fa fa-sms"></i> SMS</a>

</div>

<!-- MAIN -->

<div class="col-10 p-4">

<h2>Dashboard</h2>

<div class="row mb-4">

<div class="col">

<div class="card card-stat bg1 p-3">
<h3 id="statCustomers">0</h3>
<p>Total Customers</p>
</div>

</div>

<div class="col">

<div class="card card-stat bg2 p-3">
<h3 id="statEmails">0</h3>
<p>Emails Sent</p>
</div>

</div>

<div class="col">

<div class="card card-stat bg3 p-3">
<h3 id="statSMS">0</h3>
<p>SMS Sent</p>
</div>

</div>

</div>

<!-- SEARCH -->

<div class="card p-3 mb-3 shadow">

<div class="row">

<div class="col-6">
<input id="search" class="form-control" placeholder="Search customer..." onkeyup="searchCustomer()">
</div>

<div class="col-6 text-end">
<button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addModal">
Add Customer
</button>
</div>

</div>

</div>

<!-- TABLE -->

<div class="card p-4 shadow">

<table class="table table-hover">

<thead class="table-dark">

<tr>
<th></th>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Address</th>
<th>Action</th>
</tr>

</thead>

<tbody id="customerTable"></tbody>

</table>

<button class="btn btn-success" onclick="sendEmail()">
<i class="fa fa-envelope"></i> Send Email
</button>

<button class="btn btn-warning" onclick="sendSMS()">
<i class="fa fa-sms"></i> Send SMS
</button>

</div>

</div>

</div>

</div>

<!-- ADD MODAL -->

<div class="modal fade" id="addModal">

<div class="modal-dialog">

<div class="modal-content">

<div class="modal-header">
<h5>Add Customer</h5>
</div>

<div class="modal-body">

<input id="name" class="form-control mb-2" placeholder="Full Name">
<input id="email" class="form-control mb-2" placeholder="Email">
<input id="phone" class="form-control mb-2" placeholder="Phone">
<input id="address" class="form-control mb-2" placeholder="Address">

</div>

<div class="modal-footer">

<button class="btn btn-primary" onclick="addCustomer()">Add</button>

</div>

</div>

</div>

</div>

<script>

let customers=[]

function addCustomer(){

let name=document.getElementById("name").value
let email=document.getElementById("email").value
let phone=document.getElementById("phone").value
let address=document.getElementById("address").value

customers.push({name,email,phone,address})

render()

}

function render(){

let table=document.getElementById("customerTable")

table.innerHTML=""

customers.forEach((c,i)=>{

table.innerHTML+=`

<tr>

<td><input type="checkbox"></td>

<td>
<div class="d-flex align-items-center">
<div class="avatar me-2">${c.name[0]}</div>
${c.name}
</div>
</td>

<td>${c.email}</td>

<td>${c.phone}</td>

<td>${c.address}</td>

<td>

<button onclick="deleteCustomer(${i})" class="btn btn-danger btn-sm">
Delete
</button>

</td>

</tr>

`

})

document.getElementById("statCustomers").innerText=customers.length

}

function deleteCustomer(i){

customers.splice(i,1)

render()

}

function searchCustomer(){

let keyword=document.getElementById("search").value.toLowerCase()

let rows=document.querySelectorAll("#customerTable tr")

rows.forEach(r=>{

if(r.innerText.toLowerCase().includes(keyword))
r.style.display=""
else
r.style.display="none"

})

}

function sendEmail(){

alert("Email sending feature integrated with cloud service")

}

function sendSMS(){

alert("SMS sending feature integrated with cloud service")

}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>

<title>Customer SaaS</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
}

.sidebar{
height:100vh;
background:#1e293b;
color:white;
padding:20px;
}

.sidebar h3{
color:#38bdf8;
}

.sidebar a{
display:block;
color:white;
padding:10px;
text-decoration:none;
margin-top:10px;
}

.sidebar a:hover{
background:#334155;
}

.card-stat{
border:none;
border-radius:10px;
color:white;
}

.bg1{background:#3b82f6;}
.bg2{background:#10b981;}
.bg3{background:#f59e0b;}

</style>

</head>

<body>

<div class="container-fluid">

<div class="row">

<!-- Sidebar -->

<div class="col-2 sidebar">

<h3>Customer SaaS</h3>

<a href="#"><i class="fa fa-chart-line"></i> Dashboard</a>
<a href="#"><i class="fa fa-users"></i> Customers</a>
<a href="#"><i class="fa fa-envelope"></i> Send Email</a>
<a href="#"><i class="fa fa-sms"></i> Send SMS</a>

</div>

<!-- Main -->

<div class="col-10 p-4">

<h2>Dashboard</h2>

<div class="row mb-4">

<div class="col">

<div class="card card-stat bg1 p-3">
<h4 id="totalCustomers">0</h4>
<p>Total Customers</p>
</div>

</div>

<div class="col">

<div class="card card-stat bg2 p-3">
<h4>0</h4>
<p>Emails Sent</p>
</div>

</div>

<div class="col">

<div class="card card-stat bg3 p-3">
<h4>0</h4>
<p>SMS Sent</p>
</div>

</div>

</div>

<!-- Add Customer -->

<div class="card p-4 shadow mb-4">

<h4>Add Customer</h4>

<div class="row g-2">

<div class="col">
<input id="name" class="form-control" placeholder="Full Name">
</div>

<div class="col">
<input id="email" class="form-control" placeholder="Email">
</div>

<div class="col">
<input id="phone" class="form-control" placeholder="Phone">
</div>

<div class="col">
<input id="address" class="form-control" placeholder="Address">
</div>

<div class="col">
<button onclick="addCustomer()" class="btn btn-primary">Add</button>
</div>

</div>

</div>

<!-- Table -->

<div class="card p-4 shadow">

<h4>Customer List</h4>

<table class="table table-hover">

<thead class="table-dark">

<tr>
<th>Select</th>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Address</th>
<th>Action</th>
</tr>

</thead>

<tbody id="customerTable"></tbody>

</table>

<button class="btn btn-success">
<i class="fa fa-envelope"></i> Send Email
</button>

<button class="btn btn-warning">
<i class="fa fa-sms"></i> Send SMS
</button>

</div>

</div>

</div>

</div>

<script>

let customers=[]

function addCustomer(){

let name=document.getElementById("name").value
let email=document.getElementById("email").value
let phone=document.getElementById("phone").value
let address=document.getElementById("address").value

customers.push({name,email,phone,address})

render()

}

function render(){

let table=document.getElementById("customerTable")

table.innerHTML=""

customers.forEach((c,i)=>{

table.innerHTML+=`

<tr>

<td><input type="checkbox"></td>

<td>${c.name}</td>

<td>${c.email}</td>

<td>${c.phone}</td>

<td>${c.address}</td>

<td>

<button onclick="deleteCustomer(${i})" class="btn btn-danger btn-sm">
Delete
</button>

</td>

</tr>

`

})

document.getElementById("totalCustomers").innerText=customers.length

}

function deleteCustomer(i){

customers.splice(i,1)

render()

}

</script>

</body>
</html>

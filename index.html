<!DOCTYPE html>
<html>
<head>

<title>Customer CRM SaaS</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
}

.sidebar{
height:100vh;
background:#1e293b;
color:white;
padding:20px;
}

.sidebar h3{
color:#38bdf8;
}

.sidebar a{
display:block;
color:white;
padding:10px;
text-decoration:none;
margin-top:10px;
}

.sidebar a:hover{
background:#334155;
}

.card-stat{
border:none;
border-radius:10px;
color:white;
}

.bg1{background:#3b82f6;}
.bg2{background:#10b981;}
.bg3{background:#f59e0b;}

.avatar{
width:35px;
height:35px;
border-radius:50%;
background:#3b82f6;
color:white;
display:flex;
align-items:center;
justify-content:center;
margin-right:8px;
}

</style>

</head>

<body>

<div class="container-fluid">
<div class="row">

<!-- Sidebar -->

<div class="col-2 sidebar">

<h3>CRM SaaS</h3>

<a href="#"><i class="fa fa-chart-line"></i> Dashboard</a>
<a href="#"><i class="fa fa-users"></i> Customers</a>
<a href="#"><i class="fa fa-envelope"></i> Send Email</a>
<a href="#"><i class="fa fa-sms"></i> Send SMS</a>

</div>

<!-- Main -->

<div class="col-10 p-4">

<h2>Dashboard</h2>

<div class="row mb-4">

<div class="col">
<div class="card card-stat bg1 p-3">
<h4 id="totalCustomers">0</h4>
<p>Total Customers</p>
</div>
</div>

<div class="col">
<div class="card card-stat bg2 p-3">
<h4 id="emailCount">0</h4>
<p>Emails Sent</p>
</div>
</div>

<div class="col">
<div class="card card-stat bg3 p-3">
<h4 id="smsCount">0</h4>
<p>SMS Sent</p>
</div>
</div>

</div>

<input class="form-control mb-3" placeholder="Search customer..." onkeyup="searchCustomer(this.value)">

<div class="card p-4 shadow mb-4">

<h4>Add Customer</h4>

<div class="row g-2">

<div class="col">
<input id="name" class="form-control" placeholder="Full Name">
</div>

<div class="col">
<input id="email" class="form-control" placeholder="Email">
</div>

<div class="col">
<input id="phone" class="form-control" placeholder="Phone">
</div>

<div class="col">
<input id="address" class="form-control" placeholder="Address">
</div>

<div class="col">
<button onclick="addCustomer()" class="btn btn-primary">Add</button>
</div>

</div>

</div>

<div class="card p-4 shadow">

<h4>Customer List</h4>

<table class="table table-hover">

<thead class="table-dark">

<tr>
<th>Select</th>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Address</th>
<th>Action</th>
</tr>

</thead>

<tbody id="customerTable"></tbody>

</table>

<button onclick="sendEmail()" class="btn btn-success">
<i class="fa fa-envelope"></i> Send Email
</button>

<button onclick="sendSMS()" class="btn btn-warning">
<i class="fa fa-sms"></i> Send SMS
</button>

</div>

</div>
</div>
</div>

<script>

const API = "http://34.227.242.141:3000"

let customers=[]
let emailCount=0
let smsCount=0

function loadCustomers(){

fetch(API+"/customers")
.then(res=>res.json())
.then(data=>{

customers=data
render()

})

}

function addCustomer(){

let name=document.getElementById("name").value
let email=document.getElementById("email").value
let phone=document.getElementById("phone").value
let address=document.getElementById("address").value

fetch(API+"/customers",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
name,email,phone,address
})

})
.then(()=>{

loadCustomers()

})

}

function render(){

let table=document.getElementById("customerTable")

table.innerHTML=""

customers.forEach((c,i)=>{

table.innerHTML+=`

<tr>

<td><input type="checkbox" class="selectCustomer" value="${c.id}"></td>

<td>
<div style="display:flex;align-items:center">
<div class="avatar">${c.name[0]}</div>
${c.name}
</div>
</td>

<td>${c.email}</td>

<td>${c.phone}</td>

<td>${c.address}</td>

<td>

<button onclick="editCustomer(${c.id})" class="btn btn-info btn-sm">
Edit
</button>

<button onclick="deleteCustomer(${c.id})" class="btn btn-danger btn-sm">
Delete
</button>

</td>

</tr>

`

})

document.getElementById("totalCustomers").innerText=customers.length

}

function deleteCustomer(id){

fetch(API+"/customers/"+id,{
method:"DELETE"
})
.then(()=>{
loadCustomers()
})

}

function editCustomer(id){

let c = customers.find(x=>x.id==id)

let name = prompt("Edit name",c.name)
let email = prompt("Edit email",c.email)
let phone = prompt("Edit phone",c.phone)
let address = prompt("Edit address",c.address)

fetch(API+"/customers/"+id,{

method:"PUT",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
name,email,phone,address
})

})
.then(()=>{
loadCustomers()
})

}

function searchCustomer(keyword){

keyword = keyword.toLowerCase()

let rows = document.querySelectorAll("#customerTable tr")

rows.forEach(row=>{

if(row.innerText.toLowerCase().includes(keyword))
row.style.display=""
else
row.style.display="none"

})

}

function getSelectedCustomers(){

let checkboxes=document.querySelectorAll(".selectCustomer:checked")

let selected=[]

checkboxes.forEach(cb=>{

let id=cb.value
let customer=customers.find(c=>c.id==id)

selected.push(customer)

})

return selected

}

function sendEmail(){

let selected=getSelectedCustomers()

if(selected.length===0){
alert("Please select customers")
return
}

emailCount += selected.length

document.getElementById("emailCount").innerText=emailCount

alert("Email sent to "+selected.length+" customers")

}

function sendSMS(){

let selected=getSelectedCustomers()

if(selected.length===0){
alert("Please select customers")
return
}

smsCount += selected.length

document.getElementById("smsCount").innerText=smsCount

alert("SMS sent to "+selected.length+" customers")

}

loadCustomers()

</script>

</body>
</html>

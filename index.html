<!DOCTYPE html>
<html>
<head>
<title>Customer SaaS</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h2 class="text-center mb-4">Customer Contact Management SaaS</h2>

<div class="card p-4 shadow mb-4">

<h4>Add Customer</h4>

<div class="row g-2">

<div class="col">
<input id="name" class="form-control" placeholder="Full Name">
</div>

<div class="col">
<input id="email" class="form-control" placeholder="Email">
</div>

<div class="col">
<input id="phone" class="form-control" placeholder="Phone">
</div>

<div class="col">
<input id="address" class="form-control" placeholder="Address">
</div>

<div class="col">
<button onclick="addCustomer()" class="btn btn-primary">Add</button>
</div>

</div>
</div>

<div class="card p-4 shadow">

<h4>Customer List</h4>

<table class="table table-striped">

<thead>
<tr>
<th>Select</th>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Address</th>
<th>Action</th>
</tr>
</thead>

<tbody id="customerTable">

</tbody>

</table>

<button class="btn btn-success">Send Email</button>
<button class="btn btn-warning">Send SMS</button>

</div>

</div>

<script>

let customers = []

function addCustomer(){

let name = document.getElementById("name").value
let email = document.getElementById("email").value
let phone = document.getElementById("phone").value
let address = document.getElementById("address").value

customers.push({name,email,phone,address})

render()

}

function render(){

let table = document.getElementById("customerTable")

table.innerHTML = ""

customers.forEach((c,i)=>{

table.innerHTML += `
<tr>
<td><input type="checkbox"></td>
<td>${c.name}</td>
<td>${c.email}</td>
<td>${c.phone}</td>
<td>${c.address}</td>
<td>
<button onclick="deleteCustomer(${i})" class="btn btn-danger btn-sm">Delete</button>
</td>
</tr>
`

})

}

function deleteCustomer(i){

customers.splice(i,1)

render()

}

</script>

</body>
</html>

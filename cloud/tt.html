<!DOCTYPE html>
<html>
<head>

<title>Customer CRM SaaS</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
body{ background:#f4f6f9; }

.sidebar{
height:100vh;
background:#1e293b;
color:white;
padding:20px;
}

.sidebar h3{ color:#38bdf8; }

.sidebar a{
display:block;
color:white;
padding:10px;
text-decoration:none;
margin-top:10px;
}

.sidebar a:hover{ background:#334155; }

.card-stat{
border:none;
border-radius:10px;
color:white;
}

.bg1{background:#3b82f6;}
.bg2{background:#10b981;}
.bg3{background:#f59e0b;}

.avatar{
width:35px;
height:35px;
border-radius:50%;
background:#3b82f6;
color:white;
display:flex;
align-items:center;
justify-content:center;
margin-right:8px;
}
</style>

</head>

<body>

<div class="container-fluid">
<div class="row">

<div class="col-2 sidebar">
<h3>CRM SaaS</h3>
<a href="#"><i class="fa fa-chart-line"></i> Dashboard</a>
<a href="#"><i class="fa fa-users"></i> Customers</a>
<a href="#"><i class="fa fa-envelope"></i> Send Email</a>
<a href="#"><i class="fa fa-sms"></i> Send SMS</a>
</div>

<div class="col-10 p-4">

<h2>Dashboard</h2>

<div class="row mb-4">

<div class="col">
<div class="card card-stat bg1 p-3">
<h4 id="totalCustomers">0</h4>
<p>Total Customers</p>
</div>
</div>

<div class="col">
<div class="card card-stat bg2 p-3">
<h4 id="emailCount">0</h4>
<p>Emails Sent</p>
</div>
</div>

<div class="col">
<div class="card card-stat bg3 p-3">
<h4 id="smsCount">0</h4>
<p>SMS Sent</p>
</div>
</div>

</div>

<input class="form-control mb-3" placeholder="Search customer..." onkeyup="searchCustomer(this.value)">

<div class="card p-4 shadow mb-4">

<h4>Add Customer</h4>

<div class="row g-2">

<div class="col"><input id="name" class="form-control" placeholder="Full Name"></div>
<div class="col"><input id="email" class="form-control" placeholder="Email"></div>
<div class="col"><input id="phone" class="form-control" placeholder="Phone"></div>
<div class="col"><input id="address" class="form-control" placeholder="Address"></div>

<div class="col">
<button onclick="addCustomer()" class="btn btn-primary">Add</button>
</div>

</div>
</div>

<div class="card p-4 shadow">

<h4>Customer List</h4>

<table class="table table-hover">
<thead class="table-dark">
<tr>
<th>Select</th>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Address</th>
<th>Action</th>
</tr>
</thead>

<tbody id="customerTable"></tbody>
</table>

<button onclick="sendEmail()" class="btn btn-success">
<i class="fa fa-envelope"></i> Send Email
</button>

<button onclick="sendSMS()" class="btn btn-warning">
<i class="fa fa-sms"></i> Send SMS
</button>

</div>

</div>
</div>
</div>

<script>

const API = "" // dùng cùng domain

let customers=[]
let emailCount=0
let smsCount=0

// ================= LOAD =================
function loadCustomers(){
fetch("/customers")
.then(res=>{
if(!res.ok) throw new Error("API lỗi")
return res.json()
})
.then(data=>{
customers=data
render()
})
.catch(err=>{
console.error("LOAD ERROR:", err)
alert("Không load được data (check server)")
})
}

// ================= ADD =================
function addCustomer(){

let name=document.getElementById("name").value
let email=document.getElementById("email").value
let phone=document.getElementById("phone").value
let address=document.getElementById("address").value

if(!name) return alert("Nhập tên!")

fetch("/add-customer",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({ name,email,phone,address })
})
.then(res=>{
if(!res.ok) throw new Error("Add lỗi")
return res.text()
})
.then(()=>{
clearForm()
loadCustomers()
})
.catch(err=>{
console.error("ADD ERROR:", err)
alert("Add thất bại")
})

}

// ================= CLEAR =================
function clearForm(){
document.getElementById("name").value=""
document.getElementById("email").value=""
document.getElementById("phone").value=""
document.getElementById("address").value=""
}

// ================= RENDER =================
function render(){

let table=document.getElementById("customerTable")
table.innerHTML=""

customers.forEach(c=>{

table.innerHTML+=`
<tr>

<td><input type="checkbox" class="selectCustomer" value="${c.id}"></td>

<td>
<div style="display:flex;align-items:center">
<div class="avatar">${c.name ? c.name[0] : "?"}</div>
${c.name}
</div>
</td>

<td>${c.email}</td>
<td>${c.phone}</td>
<td>${c.address}</td>

<td>
<button onclick="editCustomer(${c.id})" class="btn btn-info btn-sm">Edit</button>
<button onclick="deleteCustomer(${c.id})" class="btn btn-danger btn-sm">Delete</button>
</td>

</tr>
`
})

document.getElementById("totalCustomers").innerText=customers.length
}

// ================= DELETE =================
function deleteCustomer(id){

if(!confirm("Xóa?")) return

fetch("/delete-customer/"+id,{
method:"DELETE"
})
.then(res=>{
if(!res.ok) throw new Error("Delete lỗi")
return res.text()
})
.then(()=>loadCustomers())
.catch(err=>{
console.error("DELETE ERROR:", err)
alert("Delete thất bại")
})

}

// ================= EDIT =================
function editCustomer(id){

let c = customers.find(x=>x.id==id)

let name = prompt("Edit name",c.name)
let email = prompt("Edit email",c.email)
let phone = prompt("Edit phone",c.phone)
let address = prompt("Edit address",c.address)

fetch("/update-customer/"+id,{
method:"PUT",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({ name,email,phone,address })
})
.then(res=>{
if(!res.ok) throw new Error("Update lỗi")
return res.text()
})
.then(()=>loadCustomers())
.catch(err=>{
console.error("UPDATE ERROR:", err)
alert("Update thất bại")
})

}

// ================= SEARCH =================
function searchCustomer(keyword){
keyword = keyword.toLowerCase()
let rows = document.querySelectorAll("#customerTable tr")
rows.forEach(row=>{
row.style.display = row.innerText.toLowerCase().includes(keyword) ? "" : "none"
})
}

// ================= EMAIL =================
function sendEmail(){
let selected=getSelectedCustomers()
if(selected.length===0) return alert("Chọn khách hàng")
emailCount += selected.length
document.getElementById("emailCount").innerText=emailCount
alert("Đã gửi email")
}

// ================= SMS =================
function sendSMS(){
let selected=getSelectedCustomers()
if(selected.length===0) return alert("Chọn khách hàng")
smsCount += selected.length
document.getElementById("smsCount").innerText=smsCount
alert("Đã gửi SMS")
}

// ================= SELECT =================
function getSelectedCustomers(){
let checkboxes=document.querySelectorAll(".selectCustomer:checked")
let selected=[]
checkboxes.forEach(cb=>{
let id=cb.value
let customer=customers.find(c=>c.id==id)
selected.push(customer)
})
return selected
}

loadCustomers()

</script>
</body>
</html>
